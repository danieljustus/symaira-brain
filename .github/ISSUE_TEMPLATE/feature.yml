name: Feature request
description: Suggest new functionality or an improvement
labels: ["feature"]
body:
  - type: textarea
    id: use-case
    attributes:
      label: Use case
      description: What problem are you trying to solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: What would you like to see happen?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any other approaches you've thought about, and why they don't fit.
    validations:
      required: false
