name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build DMG for (e.g. v0.2.2)'
        required: false
        type: string

permissions:
  contents: write
  id-token: write # required for Cosign keyless signing

jobs:
  # Re-run the same gates as CI at tag time: a tag push does not go through
  # the branch-triggered ci.yml, so the release job must not skip them.
  test:
    name: Pre-release checks
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Build (CGO-free)
        run: go build ./...
        env:
          CGO_ENABLED: "0"

      - name: Test (race detector)
        run: go test -race ./...

  govulncheck:
    name: govulncheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  release:
    name: Release
    runs-on: ubuntu-latest
    needs: [test, govulncheck]
    environment: release
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Cosign
        uses: sigstore/cosign-installer@6f9f17788090df1f26f669e9d70d6ae9567deba6 # v4.1.2
        with:
          cosign-release: 'v2.4.3'

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: Check if release already exists (avoid rerun deadlock)
        id: check_release
        run: |
          if gh release view "${{ github.ref_name }}" --repo ${{ github.repository }} 2>/dev/null; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            gh release view "${{ github.ref_name }}" --repo ${{ github.repository }} --json assets --jq '.assets[].name' | sort > /tmp/existing-assets.txt
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Build and publish (first run)
        if: steps.check_release.outputs.exists != 'true'
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

      - name: Build and push Homebrew formula only (rerun)
        if: steps.check_release.outputs.exists == 'true'
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --clean --skip-upload
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}

  macos-gui-dmg:
    name: macOS GUI DMG
    runs-on: macos-15
    environment: release
    needs: [test, govulncheck]
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Determine version
        id: version
        run: |
          # On tag push (release workflow): use GITHUB_REF_NAME
          # On workflow_dispatch: use the provided input or derive from latest tag
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            if [[ -n "${{ inputs.tag }}" ]]; then
              TAG="${{ inputs.tag }}"
              VERSION="${TAG#v}"
            else
              TAG="$(git describe --tags --abbrev=0)"
              VERSION="${TAG#v}"
            fi
          else
            TAG="${{ github.ref_name }}"
            VERSION="${GITHUB_REF_NAME#v}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Using tag=$TAG version=$VERSION"

      - name: Import signing certificate
        id: signing
        env:
          CERTIFICATE_P12: ${{ secrets.CERTIFICATE_P12 }}
          CERTIFICATE_PASSWORD: ${{ secrets.CERTIFICATE_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          if [ -z "${CERTIFICATE_P12:-}" ]; then
            echo "::warning::CERTIFICATE_P12 secret is not set. Building unsigned."
            echo "signed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "signed=true" >> "$GITHUB_OUTPUT"
          KEYCHAIN_PATH="$RUNNER_TEMP/signing.keychain-db"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          CERTIFICATE_PATH="$RUNNER_TEMP/certificate.p12"
          echo -n "$CERTIFICATE_P12" | base64 --decode -o "$CERTIFICATE_PATH"
          security import "$CERTIFICATE_PATH" -P "$CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychain -d user -s "$KEYCHAIN_PATH"
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TEAM_ID=$(security find-identity -v -p codesigning "$KEYCHAIN_PATH" | grep "Developer ID Application" | head -1 | sed 's/.*(\([A-Z0-9]*\))/\1/')
          if [ -z "$IDENTITY" ]; then
            echo "::error::No Developer ID Application identity found."
            exit 1
          fi
          echo "CODESIGN_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "TEAM_ID=$TEAM_ID" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Patch project.yml for CI (replace local path dependency with pinned URL)
        run: |
          perl -i'' -pe "s|path: ../symaira-appkit|url: https://github.com/danieljustus/symaira-appkit\n    exactVersion: 0.2.0|" project.yml

      - name: Install XcodeGen
        run: brew install xcodegen 2>/dev/null || brew upgrade xcodegen 2>/dev/null || true

      - name: Set version in Info.plist
        run: |
          plutil -replace CFBundleShortVersionString "${{ steps.version.outputs.version }}" Sources/SymBrainApp/Info.plist
          plutil -replace CFBundleVersion "${{ github.run_number }}" Sources/SymBrainApp/Info.plist
          echo "Updated version to ${{ steps.version.outputs.version }}"

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build and sign GUI app
        run: |
          if [ "${{ steps.signing.outputs.signed }}" = "true" ]; then
            xcodebuild -project SymBrain.xcodeproj \
              -scheme SymBrain \
              -configuration Release \
              -derivedDataPath build \
              CODE_SIGN_STYLE=Manual \
              CODE_SIGN_IDENTITY="$CODESIGN_IDENTITY" \
              DEVELOPMENT_TEAM="$TEAM_ID" \
              CODE_SIGNING_ALLOWED=YES \
              CODE_SIGNING_REQUIRED=YES
          else
            echo "::warning::Building GUI without code signing"
            xcodebuild -project SymBrain.xcodeproj \
              -scheme SymBrain \
              -configuration Release \
              -derivedDataPath build
          fi
          APP_BUNDLE=$(find build -name 'SymBrain.app' -type d -maxdepth 4 | head -1)
          if [ -z "$APP_BUNDLE" ]; then
            echo "::error::App bundle not found after build"
            exit 1
          fi
          echo "APP_BUNDLE=$APP_BUNDLE" >> "$GITHUB_ENV"

      - name: Prepare app bundle for notarization
        if: steps.signing.outputs.signed == 'true'
        env:
          NOTARY_API_KEY: ${{ secrets.NOTARY_API_KEY }}
          NOTARY_API_ISSUER: ${{ secrets.NOTARY_API_ISSUER }}
          NOTARY_API_KEY_ID: ${{ secrets.NOTARY_API_KEY_ID }}
        run: |
          APP="${{ env.APP_BUNDLE }}"
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::App bundle not found"
            exit 1
          fi
          ZIP_PATH="$RUNNER_TEMP/SymBrain.zip"
          ditto -c -k --keepParent "$APP" "$ZIP_PATH"
          if [ -n "${NOTARY_API_KEY:-}" ]; then
            xcrun notarytool submit "$ZIP_PATH" \
              --apple-id "${NOTARY_API_KEY_ID}" \
              --team-id "${NOTARY_API_ISSUER}" \
              --password "${NOTARY_API_KEY}" \
              --wait
            xcrun stapler staple "$APP"
            echo "Notarization complete"
          else
            echo "::warning::NOTARY_API_KEY not set. Skipping notarization."
          fi

      - name: Create DMG
        id: dmg
        run: |
          APP="${{ env.APP_BUNDLE }}"
          if [ -z "$APP" ] || [ ! -d "$APP" ]; then
            echo "::error::App bundle not found for DMG creation"
            exit 1
          fi
          VERSION="${{ steps.version.outputs.version }}"
          DMG_PATH="$RUNNER_TEMP/SymBrain-$VERSION.dmg"
          DMG_STAGING="$RUNNER_TEMP/dmg-staging"
          mkdir -p "$DMG_STAGING"
          cp -R "$APP" "$DMG_STAGING/"
          hdiutil create -volname "SymBrain $VERSION" \
            -srcfolder "$DMG_STAGING" \
            -ov -format UDZO \
            "$DMG_PATH"
          echo "dmg_path=$DMG_PATH" >> "$GITHUB_OUTPUT"
          echo "dmg_name=SymBrain-$VERSION.dmg" >> "$GITHUB_OUTPUT"

      - name: Upload GUI app to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.version.outputs.tag }}" \
            "${{ steps.dmg.outputs.dmg_path }}" --clobber

      - name: Clean up signing material
        if: always()
        run: |
          if [ -n "${KEYCHAIN_PATH:-}" ] && [ -f "$KEYCHAIN_PATH" ]; then
            security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true
          fi
