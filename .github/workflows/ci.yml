name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # golangci-lint has a known incompatibility with Go 1.26 in this
  # ecosystem (see symaira-scope). gofmt + go vet below are the lint gate
  # until golangci-lint ships a Go-1.26-compatible release — re-enable a
  # dedicated lint job at that point.
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Format check
        run: |
          fmt_out="$(gofmt -l .)"
          if [ -n "$fmt_out" ]; then
            echo "gofmt needs to be run on:"
            echo "$fmt_out"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      # symbrain ships CGO-free; verify that build configuration explicitly.
      - name: Build (CGO-free)
        run: go build ./...
        env:
          CGO_ENABLED: "0"

      # -race requires cgo, so this step deliberately does not set
      # CGO_ENABLED=0 (unlike the build step above).
      - name: Test (race detector)
        run: go test -race ./...

  # Stdio hygiene gate: `symbrain serve` must emit nothing but JSON-RPC
  # frames on stdout across startup, tools/list, a failing tools/call and
  # shutdown (fake children). A dedicated job so a transport-breaking
  # regression is visible by name, not buried in the unit-test log.
  stdio-hygiene:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Stdio hygiene gate
        run: go test -race -count=1 -run TestStdioHygiene ./cmd/symbrain/

  govulncheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: govulncheck
        run: go run golang.org/x/vuln/cmd/govulncheck@latest ./...

  # Validates .goreleaser.yml on every push/PR, not only at tag time, so a
  # broken release config is caught long before a real release tag is
  # pushed. Runs the real build/archive/checksum/SBOM pipeline a release
  # would (--snapshot skips publishing); signing is skipped here because it
  # needs the tag-triggered release workflow's ambient OIDC token, which a
  # plain push/PR run does not have.
  goreleaser-snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Syft
        uses: anchore/sbom-action/download-syft@e22c389904149dbc22b58101806040fa8d37a610 # v0.24.0

      - name: goreleaser release --snapshot --clean
        uses: goreleaser/goreleaser-action@f06c13b6b1a9625abc9e6e439d9c05a8f2190e94 # v7.2.3
        with:
          distribution: goreleaser
          version: '~> v2'
          args: release --snapshot --clean --skip=sign
