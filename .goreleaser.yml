# GoReleaser configuration for Symaira Brain (symbrain)
# Documentation: https://goreleaser.com

version: 2

project_name: symbrain

before:
  hooks:
    - go mod tidy

builds:
  - id: symbrain
    main: ./cmd/symbrain
    binary: symbrain
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X main.version={{.Version}}
    mod_timestamp: "{{ .CommitTimestamp }}"

archives:
  - id: default
    formats: [tar.gz]
    name_template: >-
      {{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md
      - AGENTS.md

checksum:
  name_template: "checksums.txt"
  algorithm: sha256

sboms:
  - artifacts: archive
    documents:
      - "${artifact}.sbom.json"
    cmd: syft
    args: ["$artifact", "--output", "cyclonedx-json=$document"]

signs:
  - cmd: cosign
    certificate: "${artifact}.pem"
    args:
      - "sign-blob"
      - "--yes"
      - "--output-certificate=${certificate}"
      - "--output-signature=${signature}"
      - "${artifact}"
    artifacts: all

snapshot:
  version_template: "{{ incpatch .Version }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"
      - Merge pull request
      - Merge branch

release:
  github:
    owner: danieljustus
    name: symaira-brain
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

brews:
  - name: symbrain
    repository:
      owner: danieljustus
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_GITHUB_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/danieljustus/symaira-brain"
    description: "Portable agent-context layer: one MCP gateway multiplexing vault, memory, and skills for AI harnesses"
    license: Apache-2.0
    test: |
      system "#{bin}/symbrain", "version"

dist: dist
